name: Build AegisNeuro Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build arm64-v8a debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3 python3-pip python3-venv \
            autoconf automake cmake libltdl-dev libtool \
            libffi-dev libssl-dev libbz2-dev libsqlite3-dev \
            zlib1g-dev liblzma-dev libreadline-dev libncurses5-dev \
            libncursesw5-dev libgdbm-dev libgdbm-compat-dev \
            uuid-dev tk-dev libbluetooth-dev \
            openjdk-17-jdk unzip

      - name: Setup Android SDK and accept licenses
        run: |
          export ANDROID_HOME="${HOME}/.buildozer/android/platform/android-sdk"
          mkdir -p "${ANDROID_HOME}/cmdline-tools/latest"
          # Download Android SDK Command Line Tools
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11042270_latest.zip"
          curl -sL "${CMDLINE_TOOLS_URL}" -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
          mv /tmp/cmdline-tools/cmdline-tools/* "${ANDROID_HOME}/cmdline-tools/latest/" || true
          # Accept all licenses
          mkdir -p "${ANDROID_HOME}/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "${ANDROID_HOME}/licenses/android-sdk-license"
          echo "d56f5187479341e3f443e4ec59e5a8af79cb0a3d" >> "${ANDROID_HOME}/licenses/android-sdk-license"
          echo "84831b9409646a918e3a3b024b4b9e0e4a272d7b" >> "${ANDROID_HOME}/licenses/android-sdk-license"
          # Install required SDK components
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_HOME}" "platform-tools" "build-tools;37.0.0" "platforms;android-35"

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Verify environment
        run: |
          echo "=== CWD: $(pwd) ==="
          echo "=== buildozer version: $(buildozer --version 2>&1) ==="
          echo "=== python version: $(python3 --version 2>&1) ==="
          echo "=== cython version: $(cython --version 2>&1 || echo 'cython not found') ==="
          echo "=== JAVA_HOME: ${JAVA_HOME:-not set} ==="
          echo "=== buildozer.spec sha: $(sha256sum buildozer.spec | cut -d' ' -f1) ==="
          echo "=== version* lines in spec: ==="
          grep -n "version" buildozer.spec || true

      - name: Build APK (debug, arm64)
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.jvmargs=-Xmx4g"
          JAVA_TOOL_OPTIONS: "-Xmx4g"
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== buildozer exit code: ${PIPESTATUS[0]} ==="
          echo "=== final bin/ contents ==="
          ls -laR bin/ 2>&1 | head -50 || true
          find . -name "*.apk" -type f 2>/dev/null | head -20

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aegisneuro-build-log
          path: |
            build.log
            .buildozer/**/*.log
            .buildozer/**/build/output/**/*.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Locate APK
        if: success()
        run: |
          echo "Looking for APK in bin/..."
          ls -la bin/ || true
          find . -name "*.apk" -type f 2>/dev/null | head -20

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aegisneuro-arm64-debug
          path: |
            bin/*.apk
            !bin/*.aab
          if-no-files-found: error
          retention-days: 14
