name: AegisNeuro CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  # ── Тесты ──────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install numpy pytest pytest-cov
      - name: Run tests
        run: |
          pip install -e .
          python -m pytest tests/ -v --tb=short --cov=aegis --cov-report=term-missing
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
          retention-days: 7

  # ── Android APK ───────────────────────────────────────────────────
  build-android:
    name: Build arm64 APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    needs: test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
            ~/.buildozer/android/tarballs
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo -S -p '' apt-get update -qq
          sudo -S -p '' apt-get install -y -qq \
            python3 python3-pip python3-venv \
            autoconf automake cmake libltdl-dev libtool \
            libffi-dev libssl-dev libbz2-dev libsqlite3-dev \
            zlib1g-dev liblzma-dev libreadline-dev libncurses5-dev \
            libncursesw5-dev libgdbm-dev libgdbm-compat-dev \
            uuid-dev tk-dev libbluetooth-dev \
            unzip

      - name: Install Android SDK cmdline-tools and build-tools
        run: |
          set -e
          ANDROID_SDK_ROOT="${HOME}/.buildozer/android/platform/android-sdk"
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          cd /tmp
          if [ ! -d "${ANDROID_SDK_ROOT}/cmdline-tools/latest" ]; then
            echo "Downloading cmdline-tools..."
            curl -fsSL -o cmdline-tools.zip "${CMDLINE_TOOLS_URL}"
            unzip -q cmdline-tools.zip
            mv cmdline-tools "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
            echo "cmdline-tools installed"
          else
            echo "cmdline-tools already present"
          fi
          # Принимаем все лицензии (для уже скачанного SDK, build-tools и platform-tools)
          yes 2>/dev/null | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          # Докачиваем build-tools и platform-tools, чтобы buildozer не искал старый tools/bin/sdkmanager
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" >/dev/null 2>&1 || true
          # Проверяем, что buildozer увидит sdkmanager
          ls -la "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" || true
          mkdir -p "${ANDROID_SDK_ROOT}/tools/bin"
          ln -sf "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
                 "${ANDROID_SDK_ROOT}/tools/bin/sdkmanager" || true
          echo "=== sdkmanager at expected location ==="
          ls -la "${ANDROID_SDK_ROOT}/tools/bin/sdkmanager" || true

      - name: Pre-accept Android SDK licenses
        run: |
          ANDROID_SDK_ROOT="${HOME}/.buildozer/android/platform/android-sdk"
          mkdir -p "${ANDROID_SDK_ROOT}/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "${ANDROID_SDK_ROOT}/licenses/android-sdk-license"
          echo "d56f5187479341e3f443e4ec59e5a8af79cb0a3d" >> "${ANDROID_SDK_ROOT}/licenses/android-sdk-license"
          echo "84831b9409646a918e3a3b024b4b9e0e4a272d7b" >> "${ANDROID_SDK_ROOT}/licenses/android-sdk-license"
          mkdir -p "${HOME}/Android/Sdk/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "${HOME}/Android/Sdk/licenses/android-sdk-license"
          echo "d56f5187479341e3f443e4ec59e5a8af79cb0a3d" >> "${HOME}/Android/Sdk/licenses/android-sdk-license"
          echo "84831b9409646a918e3a3b024b4b9e0e4a272d7b" >> "${HOME}/Android/Sdk/licenses/android-sdk-license"

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Verify environment
        run: |
          echo "=== buildozer version: $(buildozer --version 2>&1) ==="
          echo "=== python version: $(python3 --version 2>&1) ==="
          echo "=== JAVA_HOME: ${JAVA_HOME:-not set} ==="
          echo "=== java version: $(java -version 2>&1) ==="
          echo "=== buildozer.spec sha: $(sha256sum buildozer.spec | cut -d' ' -f1) ==="

      - name: Build APK (debug, arm64)
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.jvmargs=-Xmx4g"
          JAVA_TOOL_OPTIONS: "-Xmx4g"
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== APK contents ==="
          ls -laR bin/ 2>&1 | head -50 || true

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aegisneuro-build-log
          path: |
            build.log
            .buildozer/**/*.log
            .buildozer/**/build/output/**/*.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aegisneuro-arm64-debug
          path: |
            bin/*.apk
            !bin/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Publish APK to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: "Auto-built APK from commit ${{ github.sha }}"
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}