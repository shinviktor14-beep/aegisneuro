name: Build AegisNeuro Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build arm64-v8a debug APK
    runs-on: ubuntu-22.04
    # Официальный Kivy-образ: buildozer + p4a + Android SDK + NDK + cython
    # уже предустановлены и проверено совместимы. Исключает весь класс
    # проблем "buildozer поставил не ту версию".
    container:
      image: kivy/buildozer:latest
      options: --privileged
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify environment
        run: |
          echo "=== CWD: $(pwd) ==="
          echo "=== buildozer version: $(buildozer --version 2>&1) ==="
          echo "=== python version: $(python --version 2>&1) ==="
          echo "=== cython version: $(cython --version 2>&1 || echo 'cython not in PATH') ==="
          echo "=== ANDROID_HOME: $ANDROID_HOME ==="
          ls -la $ANDROID_HOME 2>&1 | head -5 || true
          echo "=== buildozer.spec sha: $(sha256sum buildozer.spec | cut -d' ' -f1) ==="
          echo "=== version* lines in spec: ==="
          grep -n "version" buildozer.spec || true

      - name: Clean stale buildozer state
        run: |
          rm -rf ~/.buildozer .buildozer || true
          echo "Stale buildozer state cleaned."

      - name: Build APK (debug, arm64)
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.jvmargs=-Xmx4g"
          JAVA_TOOL_OPTIONS: "-Xmx4g"
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== buildozer exit code: ${PIPESTATUS[0]} ==="
          echo "=== final bin/ contents ==="
          ls -laR bin/ 2>&1 | head -50 || true
          find . -name "*.apk" -type f 2>/dev/null | head -20

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aegisneuro-build-log
          path: |
            build.log
            .buildozer/**/*.log
            .buildozer/**/build/output/**/*.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Locate APK
        if: success()
        run: |
          echo "Looking for APK in bin/..."
          ls -la bin/ || true
          find . -name "*.apk" -type f 2>/dev/null | head -20

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aegisneuro-arm64-debug
          path: |
            bin/*.apk
            !bin/*.aab
          if-no-files-found: error
          retention-days: 14
